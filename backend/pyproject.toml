[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = [
    "api",
    "api.routers",
    "api.schemas",
    "core",
    "db",
    "db.seeds",
    "models",
    "repositories",
    "services",
    "utils",
    "workers",
]
package-dir = {"" = "src"}

[project]
name = "steamselfgifter-backend"
version = "2.0.0"
description = "Automated SteamGifts bot backend with REST API"
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"

dependencies = [
    "fastapi>=0.137.0",
    "uvicorn[standard]>=0.49.0",
    "sqlalchemy>=2.0.51",
    "alembic>=1.18.0",
    "aiosqlite>=0.22.0",
    "pydantic>=2.13.0",
    "pydantic-settings>=2.14.0",
    "httpx>=0.28.0",
    "beautifulsoup4>=4.15.0",
    "html5lib>=1.1",
    "apscheduler>=3.11.0,<4",
    "structlog>=26.1.0",
    "python-multipart>=0.0.32",
    "websockets>=16.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "faker>=40.0.0",
    "factory-boy>=3.3.0",
    "ruff>=0.15.0",
    "mypy>=2.0.0",
    "pre-commit>=4.0.0",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# Generated migration files: keep autogenerated formatting as-is.
"src/alembic/versions/*" = ["E501", "W291"]
# Tests: allow long fixture lines (inline HTML), fixture factories named
# after the app globals they mirror, and path-setup before imports.
"tests/**" = ["E501", "N806", "E402"]

[tool.mypy]
python_version = "3.14"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --cov=src --cov-report=html --cov-report=term"
